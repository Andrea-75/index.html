<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Simples</title>
<style>
    body {
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #e3f2fd;
    }

    .calculadora {
        background: #1e1e2f;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        border: 4px solid #0d47a1;
    }

    h2 {
        color: white;
        text-align: center;
        margin-bottom: 10px;
    }

    input {
        width: 200px;
        height: 40px;
        font-size: 20px;
        text-align: right;
        margin-bottom: 10px;
        border-radius: 5px;
        border: none;
        padding: 5px;
        background: #000;
        color: #00ffcc;
    }

    button {
        width: 45px;
        height: 45px;
        font-size: 18px;
        margin: 2px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: white;
    }

    button.numero {
        background: #42a5f5;
    }

    button.operador {
        background: #ef6c00;
    }

    button.igual {
        background: #2e7d32;
    }

    button.limpar {
        background: #c62828;
        width: 100%;
    }

    button:hover {
        opacity: 0.85;
    }
</style>
</head>
<body>

<div class="calculadora">
<h2>Calculadora</h2>

<input type="text" id="display" disabled>
<br>

<button class="numero" onclick="add('7')">7</button>
<button class="numero" onclick="add('8')">8</button>
<button class="numero" onclick="add('9')">9</button>
<button class="operador" onclick="add('/')">÷</button>
<br>

<button class="numero" onclick="add('4')">4</button>
<button class="numero" onclick="add('5')">5</button>
<button class="numero" onclick="add('6')">6</button>
<button class="operador" onclick="add('*')">×</button>
<br>

<button class="numero" onclick="add('1')">1</button>
<button class="numero" onclick="add('2')">2</button>
<button class="numero" onclick="add('3')">3</button>
<button class="operador" onclick="add('-')">−</button>
<br>

<button class="numero" onclick="add('0')">0</button>
<button class="numero" onclick="add('.')">.</button>
<button class="igual" onclick="calc()">=</button>
<button class="operador" onclick="add('+')">+</button>
<br>

<button class="limpar" onclick="clearDisplay()">C</button>

</div>

<script>
function add(valor) {
    document.getElementById('display').value += valor;
}

function calc() {
    try {
        document.getElementById('display').value = eval(document.getElementById('display').value);
    } catch {
        document.getElementById('display').value = 'Erro';
    }
}

function clearDisplay() {
    document.getElementById('display').value = '';
}
</script>

</body>
</html>
